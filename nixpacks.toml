[phases.setup]
nixPkgs = ["php82", "phpPackages.composer", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.bcmath", "php82Extensions.fileinfo"]

[phases.install]
cmds = ["COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-scripts"]

[start]
cmd = "bash /app/start.sh"